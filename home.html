<body id="home-section">
    <header id="header-section" class="flex justify-between bg-zinc-100 p-5">
        <div class="flex items-center gap-2">
            <img class="size-10" src="./assets/github-logo.png" alt="">
            <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
        </div>
        <div class="flex justify-end gap-5">
            <div>
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input type="search" required placeholder="Search" />
                </label>
            </div>
            <div>
                <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
            </div>
        </div>
    </header>

    <section class="w-11/12 mx-auto">
        <div class="bg-gray-100 mt-10 p-5 rounded-md">
            <div class="flex gap-3">
                <button class="btn btn-outline w-25">All</button>
                <button class="btn btn-outline w-25">Open</button>
                <button class="btn btn-outline w-25">Closed</button>
            </div>
        </div>
        <div class="bg-gray-100 mt-10 p-5 rounded-md">
            <div class="flex justify-between">
                <div class="flex items-center gap-2">
                    <div><img src="./assets/Aperture.png" alt=""></div>
                    <div>
                        <p class="text-xl font-bold">50 Issues</p>
                        <p>Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-5 items-center">
                    <p><i class="fa-regular fa-circle bg-green-500 rounded-full"></i> Open</p>
                    <p><i class="fa-regular fa-circle bg-purple-500 rounded-full"></i> Closed</p>
                </div>
            </div>
        </div>
        <hr class="text-slate-400">

        <!-- issue cards  -->
        <div id="issue-cards" class="bg-gray-100 p-5 rounded-md grid grid-cols-4 gap-5">
