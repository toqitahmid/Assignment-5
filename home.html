<body id="home-section">
    <header id="header-section" class="md:flex md:justify-between  bg-zinc-100 p-5 space-y-6">
        <div class="flex items-center gap-2">
            <img class="size-10" src="./assets/github-logo.png" alt="">
            <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
        </div>
        <div class="flex justify-end gap-5">
            <div>
            <div class="join">
                <div>
                    <label class="input validator join-item">
                            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
                                <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                            </g>
                        </svg>
                        <input id="user-input" type="text" placeholder="Search Issues via priority"/>
                    </label>
                    <div class="validator-hint hidden">Enter valid email address</div>
                </div>
                <button id="search-btn" class="btn btn-outline rounded-r-md">Search</button>
            </div>
            </div>
            <div>
                <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
            </div>
        </div>
    </header>

    <section class="w-11/12 mx-auto">
        <div class="bg-gray-100 mt-10 p-5 rounded-md">
            <div class="flex gap-3">
                <button id="all-btn" class="btn btn-primary w-25 filter-btn">All</button>
                <button id="open-btn" class="btn btn-primary w-25 filter-btn">Open</button>
                <butto id="closed-btn" class="btn btn-primary w-25 filter-btn">Closed</butto>
            </div>
        </div>
        <div class="bg-gray-100 mt-10 p-5 rounded-md">
            <div class="flex justify-between">
                <div class="flex items-center gap-2">
                    <div><img src="./assets/Aperture.png" alt=""></div>
                    <div>
                        <p class="md:text-xl font-bold text-2xl"><span id="issue-count">50</span> Issues</p>
                        <p class="md:text-xs">Track and manage <br> your project issues</p>
                    </div>
                </div>
                <div class="flex gap-5 items-center text-xs">
                    <p><i class="fa-regular fa-circle bg-green-500 rounded-full text-xs"></i> Open</p>
                    <p><i class="fa-regular fa-circle bg-purple-500 rounded-full text-xs"></i> Closed</p>
                </div>
            </div>
        </div>
        <hr class="text-slate-400">

        <!-- issue cards  -->
        <div id="issue-cards" class="bg-gray-100 p-5 rounded-md grid md:grid-cols-4 gap-5">

        <!-- Open the modal using ID.showModal() method -->
        <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
        <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
            <div class="modal-box">
                <div id="modal-div">
                    <div class="p-4">
                        <h2 class="text-2xl font-bold pb-2">T: Fix broken image uploads</h2>
                        <button class="btn btn-dash btn-primary">Status</button>
                        <p class="inline-block ml-2"> opend by <span>assignee</span> | <span>updatedAt</span></p>
                        <div class="flex justify-start gap-5 pt-5 pb-5">
                            <p class="btn btn-soft btn-secondary rounded-full w-25">L: Bug</p>
                            <p class="btn btn-soft btn-warning rounded-full w-35">L: Help wanted</p>
                        </div>
                    
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="font-bold">Assignee</p>
                                <p>Name</p>
                            </div>
                            <div>
                                <p class="font-bold">Priority</p>
                                <button class="btn btn-outline ">high</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn btn-primary mr-4 w-16">Close</button>
                    </form>
                </div>
            </div>
        </dialog>
